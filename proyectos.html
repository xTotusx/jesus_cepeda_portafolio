<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Completo | JESUS CEPEDA</title>

    <link rel="icon" type="image/png" href="./fts/logojc.png">

    <link rel="stylesheet" href="style.css">
    <style>
        /* Un par de ajustes ligeros solo para que esta página se vea sin bloqueos */
        body {
            padding: 40px 20px;
            overflow-y: auto;
        }

        .scroll-container {
            height: auto;
            overflow-y: visible;
            scroll-snap-type: none;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>PORTAFOLIO COMPLETO</h1>
        <a href="index.html" class="btn-back">← Volver al Inicio</a>
    </div>

    <div class="folders-grid-container" id="folders-container"></div>

    <div id="gallery-overlay" class="overlay">
        <div id="dynamic-bg-overlay"></div>
        <button class="fixed-back-btn" onclick="cerrarOverlay()">← Volver</button>
        <section class="overlay-hero-section" id="overlay-hero-section">
            <div class="overlay-hero-content">
                <h2 class="gallery-title-hero" id="gallery-title-hero">Nombre del Evento</h2>
                <p class="scroll-indicator">↓ Desliza para ver la galería ↓</p>
            </div>
        </section>
        <section class="overlay-gallery-section">
            <div class="overlay-content">
                <div class="photos-grid" id="photos-container-overlay"></div>
            </div>
        </section>
    </div>

    <div id="lightbox">
        <span class="close-btn" onclick="cerrarLightbox()">&times;</span>
        <div class="lightbox-nav lightbox-prev" onclick="cambiarFoto(-1)">&#10094;</div>
        <img id="lightbox-img" src="" alt="Vista ampliada">
        <div class="lightbox-nav lightbox-next" onclick="cambiarFoto(1)">&#10095;</div>
    </div>

    <script>
        /* ===================================================
           CONFIGURACIÓN DEL PORTAFOLIO COMPLETO
           =================================================== */
        const portfolioData = [
            {
                id: 'espartanos-encuentro',
                title: 'Espartanos',
                date: 'Febrero 2026',
                covers: ['./fts/espartanos.jpeg'],
                photos: [
                    './fts/espartanos.jpeg', './fts/espartanos-cover1.jpeg', './fts/espartanos-cover2.jpeg',
                    './fts/espartanos-cover3.jpeg', './fts/espartanos1.jpeg', './fts/espartanos2.jpeg',
                    './fts/espartanos5.jpeg', './fts/espartanos6.jpeg', './fts/espartanos7.jpeg',
                    './fts/espartanos8.jpeg', './fts/espartanos9.jpeg', './fts/espartanos10.jpeg',
                    './fts/espartanos11.jpeg', './fts/espartanos12.jpeg', './fts/espartanos13.jpeg',
                    './fts/espartanos14.jpeg', './fts/espartanos15.jpeg', './fts/espartanos16.jpeg'
                ]
            },
            {
                id: 'equipo-mazatlan',
                title: 'Mazatlan Futbol Team',
                date: 'Febrero 2026',
                covers: ['./fts/mazatlan-cover.jpeg'],
                photos: [
                    './fts/mazatlan1.jpeg', './fts/mazatlan2.jpeg', './fts/mazatlan3.jpeg',
                    './fts/mazatlan4.jpeg', './fts/mazatlan5.jpeg', './fts/mazatlan6.jpeg',
                    './fts/mazatlan7.jpeg', './fts/mazatlan8.jpeg', './fts/mazatlan9.jpeg',
                    './fts/mazatlan10.jpeg', './fts/mazatlan-cover.jpeg'
                ]
            },
            {
                id: 'academia-porteros',
                title: 'Academia Porteros',
                date: 'Marzo 2026',
                covers: ['./fts/porteros1.jpeg'],
                photos: [
                    './fts/porteros1.jpeg', './fts/porteros2.jpeg', './fts/porteros3.jpeg',
                    './fts/porteros4.jpeg', './fts/porteros5.jpeg', './fts/porteros6.jpeg',
                    './fts/porteros7.jpeg', './fts/porteros8.jpeg', './fts/porteros9.jpeg',
                    './fts/porteros10.jpeg', './fts/porteros11.jpeg', './fts/porteros12.jpeg',
                    './fts/porteros13.jpeg'
                ]
            },
            {
                id: 'momentos-carpeta',
                title: 'Momentos',
                date: 'Marzo 2026',
                covers: ['./fts/momentos1.jpeg'],
                photos: [
                    './fts/momentos1.jpeg', './fts/momentos2.jpeg', './fts/momentos3.jpeg',
                    './fts/momentos4.jpeg', './fts/momentos5.jpeg', './fts/momentos6.jpeg',
                    './fts/momentos7.jpeg', './fts/momentos8.jpeg', './fts/momentos9.jpeg',
                    './fts/momentos10.jpeg', './fts/momentos11.jpeg', './fts/momentos12.jpeg',
                    './fts/momentos13.jpeg'
                ]
            }
        ];

        /* ===================================================
           LÓGICA JAVASCRIPT
           =================================================== */
        const foldersContainer = document.getElementById('folders-container');
        const overlay = document.getElementById('gallery-overlay');
        const overlayHeroSection = document.getElementById('overlay-hero-section');
        const overlayBg = document.getElementById('dynamic-bg-overlay');
        const overlayTitle = document.getElementById('gallery-title-hero');
        const photosContainer = document.getElementById('photos-container-overlay');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        let currentGalleryPhotos = [];
        let currentPhotoIndex = 0;

        function initPortfolio() {
            // AQUI DIBUJA TODAS LAS CARPETAS
            portfolioData.forEach(folder => {
                const card = document.createElement('div');
                card.className = 'folder-card';
                card.onclick = () => abrirGalería(folder);

                const coverSrc = folder.covers[0];

                card.innerHTML = `
                    <div class="cover-wrapper">
                        <img src="${coverSrc}" alt="Cover" class="cover-img" loading="lazy">
                    </div>
                    <div class="folder-info">
                        <h3>${folder.title}</h3>
                        <span>${folder.photos.length} Fotos - ${folder.date}</span>
                    </div>
                `;
                foldersContainer.appendChild(card);
            });
        }

        function abrirGalería(folder) {
            overlayHeroSection.style.backgroundImage = `url('${folder.covers[0]}')`;
            overlayTitle.textContent = folder.title;
            overlayBg.style.backgroundImage = `url('${folder.covers[0]}')`;

            currentGalleryPhotos = folder.photos;
            photosContainer.innerHTML = '';

            folder.photos.forEach((photoUrl, index) => {
                const img = document.createElement('img');
                img.src = photoUrl;
                img.className = 'photo-item';
                img.setAttribute('loading', 'lazy');
                img.alt = 'Foto de evento';
                img.onclick = () => abrirLightbox(index);
                photosContainer.appendChild(img);
            });

            overlay.scrollTop = 0;
            overlay.classList.add('visible');
            window.addEventListener('keydown', handleKeyboardEvents);
        }

        function cerrarOverlay() {
            overlay.classList.remove('visible');
            window.removeEventListener('keydown', handleKeyboardEvents);
            setTimeout(() => { photosContainer.innerHTML = ''; }, 600);
        }

        function abrirLightbox(index) {
            currentPhotoIndex = index;
            lightboxImg.src = currentGalleryPhotos[currentPhotoIndex];
            lightbox.classList.add('visible');
            overlay.style.overflowY = 'hidden';
        }

        function cerrarLightbox() {
            lightbox.classList.remove('visible');
            overlay.style.overflowY = 'scroll';
            setTimeout(() => { lightboxImg.src = ''; }, 300);
        }

        function cambiarFoto(direccion) {
            currentPhotoIndex += direccion;
            if (currentPhotoIndex >= currentGalleryPhotos.length) currentPhotoIndex = 0;
            else if (currentPhotoIndex < 0) currentPhotoIndex = currentGalleryPhotos.length - 1;
            lightboxImg.src = currentGalleryPhotos[currentPhotoIndex];
        }

        lightbox.addEventListener('click', function (e) {
            if (e.target === this) cerrarLightbox();
        });

        lightboxImg.addEventListener('click', (e) => e.stopPropagation());

        function handleKeyboardEvents(e) {
            const isLightboxOpen = lightbox.classList.contains('visible');
            if (e.key === 'Escape') {
                if (isLightboxOpen) cerrarLightbox();
                else if (overlay.classList.contains('visible')) cerrarOverlay();
            }
            else if (e.key === 'ArrowRight' && isLightboxOpen) cambiarFoto(1);
            else if (e.key === 'ArrowLeft' && isLightboxOpen) cambiarFoto(-1);
        }

        initPortfolio();
    </script>
</body>

</html>
